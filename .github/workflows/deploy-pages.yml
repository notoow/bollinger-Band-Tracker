name: Update market data and deploy Pages

on:
  push:
    branches: [main]
  schedule:
    # 01:15 UTC Tue-Sat = the prior US trading day's EOD data is available.
    - cron: "15 1 * * 2-6"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Refresh market data
        env:
          TIINGO_API_TOKEN: ${{ secrets.TIINGO_API_TOKEN }}
        run: node scripts/generate-market-data.mjs
      - name: Send configured breach alerts
        env:
          ALERTS_DELIVERY_ENABLED: ${{ github.event_name != 'push' && 'true' || 'false' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: node scripts/send-alerts.mjs
      - name: Build static dashboard
        env:
          VITE_GISCUS_REPO_ID: ${{ vars.VITE_GISCUS_REPO_ID }}
          VITE_GISCUS_CATEGORY: ${{ vars.VITE_GISCUS_CATEGORY }}
          VITE_GISCUS_CATEGORY_ID: ${{ vars.VITE_GISCUS_CATEGORY_ID }}
          VITE_GISCUS_TERM: ${{ vars.VITE_GISCUS_TERM }}
          VITE_GISCUS_THEME: ${{ vars.VITE_GISCUS_THEME }}
        run: npm run build:pages
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
